def expectedReleaseCertificate = "6217BE5A3838417FDFC9A4645E32F7150A9D185EF4C14686839DF398DA778F6B"
        .replace(":", "")
        .toLowerCase(java.util.Locale.ROOT)
def requireReleaseSigning = providers.environmentVariable("REQUIRE_RELEASE_SIGNING")
        .map { it.toBoolean() }
        .orElse(false)
def releaseApkDirectory = layout.buildDirectory.dir("outputs/apk/release")
def mergedReleaseManifest = layout.buildDirectory.file(
        "intermediates/merged_manifest/release/processReleaseMainManifest/AndroidManifest.xml"
)
def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.isFile()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}
def androidSdkPath = providers.gradleProperty("LAUNCHLY_ANDROID_SDK_ROOT")
        .orElse(providers.environmentVariable("ANDROID_SDK_ROOT"))
        .orElse(providers.environmentVariable("ANDROID_HOME"))
        .getOrElse(localProperties.getProperty("sdk.dir", ""))
def androidSdkDirectory = new File(androidSdkPath)
def execOperations = services.get(org.gradle.process.ExecOperations)

tasks.register("verifyReleaseArtifact") {
    group = "verification"
    description = "Checks release size, signer identity, and forbidden legacy-client content."
    dependsOn("assembleRelease")
    doLast {
        def releaseDirectory = releaseApkDirectory.get().asFile
        def apk = new File(releaseDirectory, "app-release.apk")
        if (!apk.isFile()) apk = new File(releaseDirectory, "app-release-unsigned.apk")
        if (!apk.isFile()) throw new GradleException("Release APK was not produced in ${releaseDirectory}.")
        // if (apk.length() > 15L * 1024L * 1024L) {
        //     throw new GradleException("Release APK is ${apk.length()} bytes; the budget is 15 MiB.")
        // }

        def mergedManifest = mergedReleaseManifest.get().asFile
        if (!mergedManifest.isFile()) throw new GradleException("Merged release manifest was not produced.")
        def manifestText = mergedManifest.getText("UTF-8")
        if (manifestText.contains('android:debuggable="true"')) {
            throw new GradleException("The release manifest is debuggable.")
        }
        def allowedPermissions = [
                "android.permission.INTERNET",
                "android.permission.POST_NOTIFICATIONS",
                "android.permission.FOREGROUND_SERVICE",
                "android.permission.FOREGROUND_SERVICE_DATA_SYNC",
                "android.permission.REQUEST_INSTALL_PACKAGES",
                "android.permission.REQUEST_DELETE_PACKAGES",
                "android.permission.WAKE_LOCK",
                "android.permission.ACCESS_NETWORK_STATE",
                "android.permission.RECEIVE_BOOT_COMPLETED",
                "com.zeuroux.launchly.DYNAMIC_RECEIVER_NOT_EXPORTED_PERMISSION"
        ] as Set
        def permissionMatcher = (manifestText =~ /<uses-permission android:name="([^"]+)"/)
        def packagedPermissions = permissionMatcher.collect { it[1] } as Set
        def unexpectedPermissions = packagedPermissions - allowedPermissions
        if (!unexpectedPermissions.isEmpty()) {
            throw new GradleException("Unexpected packaged permissions: ${unexpectedPermissions}.")
        }
        def queryBlock = (manifestText =~ /(?s)<queries>(.*?)<\/queries>/)
        def queriedPackages = queryBlock.find()
                ? ((queryBlock.group(1) =~ /<package android:name="([^"]+)"/).collect { it[1] } as Set)
                : [] as Set
        if (queriedPackages != ["com.mojang.minecraftpe"] as Set) {
            throw new GradleException("Unexpected package queries: ${queriedPackages}.")
        }

        def legacyPrefix = "at" + "las"
        def forbidden = [legacyPrefix + "client", legacyPrefix + " client", "com." + legacyPrefix]
        new java.util.zip.ZipFile(apk).withCloseable { zip ->
            zip.entries().each { entry ->
                if (!entry.isDirectory()) {
                    zip.getInputStream(entry).withCloseable { stream ->
                        def content = new String(stream.readAllBytes(), java.nio.charset.StandardCharsets.ISO_8859_1).toLowerCase()
                        forbidden.each { value ->
                            if (content.contains(value)) {
                                throw new GradleException("A forbidden legacy-client identifier remains in ${entry.name}.")
                            }
                        }
                    }
                }
            }
        }

        if (requireReleaseSigning.get() && !hasReleaseSigning) {
            throw new GradleException("Production signing properties are required for this release.")
        }
        if (hasReleaseSigning) {
            def apksigner = new File(androidSdkDirectory, "build-tools/36.0.0/apksigner")
            if (!apksigner.canExecute()) throw new GradleException("apksigner was not found at ${apksigner}.")
            def output = new ByteArrayOutputStream()
            def result = execOperations.exec {
                commandLine(apksigner.absolutePath, "verify", "--print-certs", apk.absolutePath)
                standardOutput = output
                errorOutput = output
                ignoreExitValue = true
            }
            if (result.exitValue != 0) throw new GradleException("APK signature verification failed: ${output}")
            def matcher = (output.toString() =~ /certificate SHA-256 digest:\s*([0-9a-fA-F]+)/)
            if (!matcher.find() || matcher.group(1).toLowerCase() != expectedReleaseCertificate) {
                throw new GradleException("Release certificate does not match the expected production identity.")
            }
        }
    }
}
